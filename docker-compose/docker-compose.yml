version: '3.8'

services:
  web_app:
    build: ../app
    networks:
      - backend
    restart: always
    # Espera a que Redis esté realmente sano antes de intentar conectar
    depends_on:
      cache_db:
        condition: service_healthy

  web_server:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      web_app:
        condition: service_started

  cache_db:
    image: redis:alpine
    networks:
      - backend
    restart: always
    # Prueba de salud para Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    ports:
      - "9443:9443"
    networks:
      - frontend

networks:
  frontend:
  backend:

volumes:
  portainer_data:
