version: '3.8'

services:
  web_app:
    build: ../app
    networks:
      - backend
    restart: always

  web_server:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      - web_app

  cache_db:
    image: redis:alpine
    networks:
      - backend
    restart: always

networks:
  frontend:
  backend:
